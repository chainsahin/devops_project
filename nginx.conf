events {
    worker_connections 1024;
}

http {
    # ⚖️ Yük Dengeleme Grubu (Upstream)
    # Gelen istekler bu iki sunucu arasında paylaştırılır
    upstream my_devops_app {
    server web-app-blue:5000;
    server web-app-green:5000;
}

    server {
        listen 80;
        server_name localhost;

        # Ana sayfa isteği geldiğinde yapılacaklar
        location / {
            proxy_pass http://my_devops_app;
            
            # Gerçek kullanıcı IP bilgilerini iletmek için gerekli ayarlar
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Bağlantı hatalarında diğer sunucuya hızlıca geçmesi için
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        }

        # Statik dosyalar veya ikonlar için hata yönetimini kolaylaştırır
        location /favicon.ico {
            log_not_found off;
            access_log off;
        }
    }
}
