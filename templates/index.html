<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>DevOps & Cloud Lab</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 80%; max-width: 500px; }
        h1 { color: #2c3e50; margin-bottom: 1rem; }
        .counter-box { font-size: 3.5rem; font-weight: bold; color: #e67e22; margin: 20px 0; }
        .badge { padding: 8px 15px; border-radius: 20px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
        .blue-env { background: #3498db; color: white; }
        .green-env { background: #2ecc71; color: white; }
        footer { margin-top: 2rem; color: #7f8c8d; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Bu Dünyada Bütün Yaptığımızın Karışılığını,Cezasını Çekeceksek Hiç Mi İyilik Yapmadık!</h1>
        <p>Proje şu an canlıda ve stabil çalışıyor.</p>
        <div class="counter-box">{{ count }}</div>
        <p>Toplam Ziyaret Sayısı</p>
        <span class="badge {{ color }}-env">Aktif Ortam: {{ version }}</span>
    </div>
    <footer>Sistem İzleniyor: 613+ ve artmaya devam ediyor...</footer>
</body>
</html>
