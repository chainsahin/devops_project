services:
  # 🔵 Mavi Sürüm (Mevcut Canlı)
  web-app-blue:
    image: ${DOCKERHUB_USERNAME}/devops_project:${GITHUB_RUN_NUMBER}
    ports:
      - "8081:5000"
    environment:
      - APP_COLOR=blue
      - APP_NAME=Mavi Sürüm
      - REDIS_HOST=redis-server
    depends_on:
      - redis-server

  # 🟢 Yeşil Sürüm (Yeni Gelecek/Test)
  web-app-green:
    image: ${DOCKERHUB_USERNAME}/devops_project:${GITHUB_RUN_NUMBER}
    ports:
      - "8082:5000"
    environment:
      - APP_COLOR=green
      - APP_NAME=Yeşil Sürüm
      - REDIS_HOST=redis-server
    depends_on:
      - redis-server

  # 👮‍♂️ Trafik Polisi (Load Balancer)
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web-app-blue
      - web-app-green

# 📊 Gözetleme Kulesi (Monitoring)
  cadvisor:
    # 'latest' yerine daha güncel ve mimariyi belirten bir sürüm kullanıyoruz
    image: google/cadvisor:latest
    container_name: cadvisor
    privileged: true # ⬅️ Sisteme tam erişim anahtarı verir
    ports:
      - "8080:8080"
    volumes:
@@ -47,13 +47,14 @@
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro # ⬅️ Kaynak yönetim merkezinin yolu

  # 🗄️ Veritabanı (Redis)
  redis-server:
    image: "redis:alpine"
    volumes:
      - redis_data:/data

# 💾 Kalıcı Veri Alanı
volumes:
  redis_data:
