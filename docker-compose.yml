services:
  # Mavi Sürüm (Mevcut Canlı) 🔵
  web-app-blue:
    image: ${DOCKERHUB_USERNAME}/devops_project:${GITHUB_RUN_NUMBER}
    ports:
      - "8081:5000"
    environment:
      - APP_COLOR=blue
      - APP_NAME=Mavi Sürüm
      - REDIS_HOST=redis-server
    depends_on:
      - redis-server

  # Yeşil Sürüm (Yeni Gelecek/Test) 🟢
  web-app-green:
    image: ${DOCKERHUB_USERNAME}/devops_project:${GITHUB_RUN_NUMBER}
    ports:
      - "8082:5000"
    environment:
      - APP_COLOR=green
      - APP_NAME=Yeşil Sürüm
      - REDIS_HOST=redis-server
    depends_on:
      - redis-server

  # Trafik Polisi 👮‍♂️
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web-app-blue
      - web-app-green

  # Veritabanı 🗄️
  redis-server:
    image: "redis:alpine"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
