name: DevOps & Cloud CI-CD Pipeline (Recovery Mode)

on:
  push:
    branches: [ "main" ]

jobs:
  # 1. BÖLÜM: Docker İmajını Oluşturma (Bu kısım aynı kalıyor)
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Çek
        uses: actions/checkout@v4

      - name: Docker Hub'a Login Ol
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker İmajını İnşa Et ve Pushla
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops_project:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops_project:${{ github.run_number }}

  # 2. BÖLÜM: Sunucu Erişimi ve Şifre Kurtarma Operasyonu 🛠️
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Sunucuya SSH Key ile Sız ve Ayarları Düzelt
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "--- KURTARMA OPERASYONU BAŞLADI ---"
            
            # 1. SSH yapılandırmasında şifreyle girişi 'yes' yap
            sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
            sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
            
            # 2. Root kullanıcısı için şifreyi tanımla
            echo "root:HadiYapalim123!" | sudo chpasswd
            
            # 3. SSH servisini yeniden başlat
            sudo systemctl restart ssh
            
            echo "--- İŞLEM TAMAMLANDI: Şifre ile girişi deneyebilirsiniz ---"

      # Bu adımda normal dağıtım dosyalarını da gönderelim ki sistem güncellensin
      - name: Kodu Çek
        uses: actions/checkout@v4

      - name: Dosyaları Sunucuya Gönder (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yml,nginx.conf,Dockerfile,app.py,requirements.txt"
          target: "/root/devops_project"

      - name: Uygulamayı Başlat
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GITHUB_RUN_NUMBER,DOCKERHUB_USERNAME
          script: |
            cd /root/devops_project
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            export GITHUB_RUN_NUMBER=${{ github.run_number }}
            docker compose pull
            docker compose up -d
